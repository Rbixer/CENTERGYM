# Sitio GYM CENTER — copiar a /etc/nginx/sites-available/ y enlazar en sites-enabled.
# Ajusta server_name y rutas de certificado (Certbot) o usa el flujo HTTP solo detrás de otro proxy.

upstream gymcenter_next {
    server 127.0.0.1:4178;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name ejemplo.com www.ejemplo.com;

    # Redirección a HTTPS (descomenta cuando tengas certificados)
    # return 301 https://$host$request_uri;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://gymcenter_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        client_max_body_size 15M;
    }
}

